<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi — FromVideo</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/login-extra.css" />
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="navbar-logo">FROM<span>VIDEO</span></a>
  <ul class="navbar-nav" id="main-nav">
    <li><a href="../index.html">Home</a></li>
    <li><a href="plans.html">Abbonamenti</a></li>
  </ul>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="page-wrapper auth-page">
  <div class="container">
    <div class="auth-card card">
      <a href="../index.html" class="auth-logo">FROM<span>VIDEO</span></a>
      <h1 class="auth-title">Bentornato!</h1>
      <p class="auth-subtitle">Accedi al tuo account per continuare</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="mario@email.com" />
          <span class="form-error" id="err-email">Inserisci un'email valida</span>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <input type="password" class="form-input" id="login-password" placeholder="La tua password" />
            <button type="button" class="toggle-pw" data-target="login-password">👁</button>
          </div>
          <span class="form-error" id="err-password">Password errata</span>
        </div>
        <div class="form-group" id="err-general-wrap" style="display:none">
          <span class="form-error show" id="err-general">Email o password non corretti</span>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg">Accedi</button>
      </form>

      <p class="auth-switch">Non hai un account? <a href="register.html">Registrati gratis</a></p>

      <!-- Demo hint -->
      <div class="demo-hint">
        <span>🔑</span>
        <span>Demo: usa le credenziali con cui ti sei registrato</span>
      </div>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (Auth.isLoggedIn()) window.location.href = 'catalog.html';

  document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  });

  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    let valid = true;

    document.getElementById('err-general-wrap').style.display = 'none';
    document.getElementById('err-email').classList.remove('show');
    document.getElementById('err-password').classList.remove('show');

    if (!email || !email.includes('@')) {
      document.getElementById('err-email').classList.add('show');
      valid = false;
    }
    if (!password) {
      document.getElementById('err-password').classList.add('show');
      valid = false;
    }
    if (!valid) return;

    const users = Storage.get('fv_users') || [];
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      document.getElementById('err-general-wrap').style.display = 'block';
      return;
    }

    Auth.setUser(user);
    Toast.show('Accesso effettuato!', 'success', 1500);
    setTimeout(() => window.location.href = 'catalog.html', 1200);
  });
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>FromVideo - Login</title>
</head>
<body>
    <div class="container">
        <img src="assets/logo.png" class="logo-img" alt="FromVideo Logo">
        <h2>Accedi a FromVideo</h2>
        <p style="color: var(--text-gray); margin-bottom: 20px;">Inserisci le tue credenziali</p>
        
        <input type="text" id="login-user" placeholder="Nome Utente">
        <input type="password" placeholder="Password">
        
        <button onclick="FromVideo.login(document.getElementById('login-user').value)">Entra</button>
        
        <p style="margin-top:15px; font-size: 0.8rem;">
            Non hai un account? <a href="index.html" style="color:var(--primary-blue)">Registrati ora</a>
        </p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
